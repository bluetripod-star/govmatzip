<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>온에어 맛집 — 방송국 PD가 찾는 찐맛집</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gugi&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg:       #080c14;
      --surface:  #0d1220;
      --surface2: #121928;
      --border:   #1e2d44;
      --text:     #d6eaff;
      --muted:    #4a6080;
      --neon:     #00c8ff;
      --violet:   #8855ff;
      --cyan:     #00ffcc;
      --amber:    #00c8ff;
      --gold:     #00ffcc;
      --green:    #00ffcc;
      --red:      #8855ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid #1e3a5f;
      padding: 0 28px;
      height: 54px;
      box-shadow: 0 1px 20px #00c8ff18;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
    }
    .on-air {
      display: flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(90deg,#8855ff,#00c8ff);
      padding: 3px 10px 3px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: white;
      animation: blink 2s ease-in-out infinite;
      box-shadow: 0 0 12px #8855ff88;
    }
    .on-air .dot {
      width: 7px; height: 7px;
      background: white;
      border-radius: 50%;
      animation: blink-dot 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.7} }
    @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.2} }

    header h1 {
      font-family: 'Gugi', sans-serif;
      font-size: 1.6rem;
      color: var(--text);
      letter-spacing: -0.05em;
      font-weight: 400;
    }
    header h1 span { color: var(--neon); text-shadow: 0 0 20px #00c8ffaa, 0 0 40px #00c8ff44; }
    header p {
      color: var(--muted);
      font-size: 0.75rem;
      margin-left: 4px;
    }

    /* ── STATION TABS ── */
    .station-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
      height: 44px;
    }
    .tab-btn {
      padding: 5px 16px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 20px;
      font-size: 0.78rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { border-color: var(--neon); color: var(--neon); }
    .tab-btn.active {
      background: var(--violet);
      border-color: var(--violet);
      color: white;
      font-weight: 700;
      box-shadow: 0 0 10px #8855ff66;
    }
    .tab-btn.all.active { background: var(--neon); border-color: var(--neon); color: #080c14; box-shadow: 0 0 12px #00c8ff66; }

    .filter-right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .tag-filter {
      padding: 4px 12px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 20px;
      font-size: 0.72rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .tag-filter.active { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 8px #00ffcc44; }

    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.76rem;
      width: 160px;
    }
    .search-wrap input:focus { outline: 1px solid var(--neon); box-shadow: 0 0 8px #00c8ff44; }
    .search-wrap input::placeholder { color: var(--muted); }

    /* ── MAIN ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── MAP ── */
    #map { width: 100%; height: 100%; }

    /* station marker label */
    .station-label {
      color: white;
      font-family: 'Gugi', sans-serif;
      font-size: 0.72rem;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .sidebar-top {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stats-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .stat { display: flex; align-items: baseline; gap: 4px; }
    .stat-num { font-family: 'Gugi', sans-serif; font-size: 1.35rem; color: var(--neon); text-shadow: 0 0 10px #00c8ff66; }
    .stat-label { font-size: 0.67rem; color: var(--muted); }
    .stat-divider { width: 1px; height: 16px; background: var(--border); }

    .sort-row {
      margin-top: 8px;
      display: flex;
      gap: 5px;
    }
    .sort-btn {
      padding: 3px 10px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 20px;
      font-size: 0.67rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.13s;
    }
    .sort-btn.active { background: var(--violet); border-color: var(--violet); color: white; font-weight: 700; box-shadow: 0 0 8px #8855ff55; }
    .sort-btn:hover:not(.active) { border-color: var(--neon); color: var(--neon); }

    /* list */
    .restaurant-list { overflow-y: auto; flex: 1; min-height: 0; }

    .restaurant-card {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .restaurant-card:hover { background: #101c2e; }
    .restaurant-card.highlighted { background: #0a1828; border-left: 2px solid var(--neon); box-shadow: inset 2px 0 12px #00c8ff18; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-name { font-weight: 700; font-size: 0.9rem; color: var(--text); padding-right: 4px; }
    .card-badges { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
    .badge {
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .badge-model  { background: #0a2a20; color: var(--cyan); border: 1px solid #0a4030; }
    .badge-old    { background: #0a1a30; color: #88aaff; border: 1px solid #1a2a50; }
    .badge-both   { background: #100a28; color: #cc88ff; border: 1px solid #301860; }

    .card-meta { margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .tag {
      font-size: 0.63rem;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 500;
    }
    .tag-station  { background: #0e1830; color: #7ab8ff; border: 1px solid #1e3050; }
    .tag-food     { background: #1a1a2a; color: #8090e0; border: 1px solid #2a2a3a; }
    .tag-distance { color: var(--muted); font-size: 0.62rem; }

    .card-address { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
    .card-since   { font-size: 0.65rem; color: #2a4a70; margin-top: 2px; }

    /* map links */
    .map-links {
      margin-top: 8px;
      display: flex;
      gap: 6px;
    }
    .map-link {
      font-size: 0.65rem;
      padding: 3px 9px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .map-link:hover { opacity: 0.85; filter: brightness(1.15); }
    .naver-link { background: #00c04a; color: #001a08; font-weight:700; }
    .kakao-link { background: #f9e000; color: #3a2000; }

    /* rank */
    .rank-badge {
      position: absolute; top: 12px; right: 13px;
      font-size: 1rem;
    }

    /* popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: var(--surface2); }
    .popup-name   { font-weight: 700; font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
    .popup-badge  { display: inline-block; font-size: 0.62rem; padding: 2px 7px; border-radius: 3px; margin-bottom: 6px; font-weight: 700; }
    .popup-detail { font-size: 0.74rem; color: var(--muted); line-height: 1.7; }
    .popup-links  { margin-top: 8px; display: flex; gap: 6px; }

    .empty-state {
      padding: 50px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 2;
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    /* 모바일 필터 행 — 기본 숨김, 모바일에서만 표시 */
    .mobile-filter-row {
      display: none;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .mobile-filter-row input {
      flex: 1;
      min-width: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.74rem;
    }
    .mobile-filter-row input:focus { outline: 1px solid var(--neon); box-shadow: 0 0 8px #00c8ff44; }
    .mobile-filter-row input::placeholder { color: var(--muted); }
    .tag-filter.mobile-tag {
      padding: 4px 10px;
      font-size: 0.7rem;
      white-space: nowrap;
    }
    @media (max-width: 680px) {
      .mobile-filter-row { display: flex; }
    }

    /* ── 탭 스크롤 ── */
    .station-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .station-tabs::-webkit-scrollbar { display: none; }

    /* ── TABLET (≤900px) ── */
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr 280px; }
    }

    /* ── MOBILE (≤680px) ── */
    @media (max-width: 680px) {
      /* body를 스크롤 가능하게 */
      html, body { height: auto; overflow: auto; }
      body { flex-direction: column; height: auto; }

      /* 헤더 */
      header {
        height: auto;
        padding: 10px 16px;
        flex-wrap: wrap;
        gap: 8px;
        box-shadow: 0 1px 20px #00c8ff18;
      }
      header h1 { font-size: 1.3rem; }
      header p { display: none; }

      /* 탭 */
      .station-tabs {
        padding: 0 12px;
        height: 40px;
        gap: 6px;
      }
      .tab-btn { padding: 4px 12px; font-size: 0.73rem; white-space: nowrap; }
      .filter-right { display: none; } /* 검색/필터는 사이드바로 이동 */

      /* 메인 레이아웃: 지도 위 / 리스트 아래 */
      .main {
        display: flex;
        flex-direction: column;
        overflow: visible;
        height: auto;
      }

      /* 지도 */
      #map { height: 52vw; min-height: 200px; max-height: 300px; }

      /* 사이드바 */
      .sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
        overflow: visible;
        min-height: 0;
        flex: none;
      }

      /* 사이드바 상단 — 검색창 모바일에서 표시 */
      .sidebar-top { padding: 10px 12px 8px; }
      .stats-row { gap: 10px; }
      .stat-num { font-size: 1.1rem; }

      /* 카드 */
      .restaurant-card { padding: 11px 12px; }
      .card-name { font-size: 0.85rem; }
      .card-address { font-size: 0.65rem; }
      .map-links { gap: 5px; }
      .map-link { font-size: 0.63rem; padding: 3px 8px; }

      /* 리스트 높이 제한 해제 */
      .restaurant-list { overflow-y: visible; max-height: none; flex: none; }
    }

    /* ── SMALL MOBILE (≤400px) ── */
    @media (max-width: 400px) {
      header h1 { font-size: 1.1rem; }
      .on-air { font-size: 0.65rem; padding: 2px 7px; }
      .tab-btn { font-size: 0.68rem; padding: 3px 10px; }
    }
  </style>
</head>

      <div class="sort-row">

        <button class="sort-btn" data-sort="name">가나다순</button>

    </div>
    <div class="restaurant-list" id="restaurantList">
      <div class="empty-state"><div class="icon">🎬</div>데이터 로딩 중...</div>
    </div>
  </div>
</div>

  /* 거리 계산 (km) */
  function distToNearest(d) {
    if (currentStation && currentStation !== '전체') {
      const s = STATIONS[currentStation];
      return haversine(d.lat, d.lng, s.lat, s.lng);
    }
    return Math.min(...Object.values(STATIONS).map(s => haversine(d.lat, d.lng, s.lat, s.lng)));
  }

  function haversine(la1, lo1, la2, lo2) {
    const R = 6371, dLat = (la2-la1)*Math.PI/180, dLon = (lo2-lo1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  /* ── 필터/정렬 ── */
  function applyFilters() {
    // 방송국 미선택 시 웰컴 화면
    if (!currentStation) {
      clearMarkers();
      document.getElementById('restaurantList').innerHTML = `
        <div class="empty-state">
          <div class="icon">📡</div>
          위의 방송국 탭을 선택하면<br>근처 찐맛집이 펼쳐져요!
        </div>`;
      document.getElementById('totalCount').textContent = '–';
      document.getElementById('modelCount').textContent = '–';
      document.getElementById('oldCount').textContent = '–';
      return;
    }
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredData = allData.filter(d => {
      if (currentStation !== '전체' && !((currentStation === '상암' && (d.station === 'MBC' || d.station === 'YTN')) || d.station === currentStation)) return false;
      if (currentFilters.has('모범음식점') && !d.isModel) return false;
      if (currentFilters.has('오래된식당') && (2025 - d.since) < 20) return false;
      if (q && !d.name.toLowerCase().includes(q)) return false;
      return true;
    });
    sortData();
    renderMarkers();
    renderList();
    updateStats();
  }

  function sortData() {
    filteredData.sort((a, b) => {
      if (currentSort === 'dist') return distToNearest(a) - distToNearest(b);
      if (currentSort === 'old')  return a.since - b.since;
      return a.name.localeCompare(b.name, 'ko');
    });
  }

  /* ── 마커 ── */
  // 연식 기반: 바이올렛 단색 + 투명도 (오래될수록 진함)
  function ageOpacity(since) {
    const age = 2025 - since;
    if (age >= 30) return 1;
    if (age >= 20) return 0.78;
    if (age >= 10) return 0.52;
    return 0.28;
  }

  function makeRestaurantIcon(d) {
    const op = ageOpacity(d.since);
    const isSpecial = d.isModel && d.isOld;
    const foodShort = (d.food || '').split('/').pop().slice(0, 4);

    // 글래스모피즘: rgba 배경 + backdrop-filter blur + 반투명 테두리
    const glassAlpha = Math.round(op * 0.55 * 255).toString(16).padStart(2, '0');
    const borderAlpha = Math.round(op * 0.7 * 255).toString(16).padStart(2, '0');
    const glowAlpha   = Math.round(op * 0.6 * 255).toString(16).padStart(2, '0');
    const textAlpha   = Math.round(Math.max(op, 0.6) * 255).toString(16).padStart(2, '0');

    return L.divIcon({
      className: '',
      html: `<div style="
          background: rgba(136,85,255,${(op * 0.45).toFixed(2)});
          backdrop-filter: blur(6px);
          -webkit-backdrop-filter: blur(6px);
          color: #fff${textAlpha};
          font-family:'Noto Sans KR',sans-serif;
          font-size: 0.54rem;
          font-weight: 700;
          padding: 2px 5px;
          border-radius: 4px;
          white-space: nowrap;
          border: 1px solid rgba(200,160,255,${(op * 0.7).toFixed(2)});
          box-shadow:
            0 0 8px rgba(136,85,255,${(op * 0.6).toFixed(2)}),
            inset 0 1px 0 rgba(255,255,255,${(op * 0.25).toFixed(2)});
          max-width: 44px;
          overflow: hidden;
          text-overflow: ellipsis;
          line-height: 1.5;
          ${isSpecial ? 'outline: 1px solid rgba(255,255,255,0.5);' : ''}
        ">${foodShort}</div>`,
      iconSize: [46, 18],
      iconAnchor: [23, 18],
      popupAnchor: [0, -22]
    });
  }

  function clearMarkers() {

  function renderMarkers() {

    filteredData.forEach((d, idx) => {
      const rank = idx + 1;

      const badgeHtml = (d.isModel && d.isOld)

      const naverUrl = `https://map.naver.com/v5/search/${encodeURIComponent(d.name + ' ' + d.address)}`;
      const kakaoUrl = `https://map.kakao.com/?q=${encodeURIComponent(d.name)}`;

      m.bindPopup(`

          <div class="popup-name">${d.name}</div>
          ${badgeHtml}
          <div class="popup-detail">
            📡 ${STATIONS[(d.station === 'MBC' || d.station === 'YTN') ? '상암' : d.station]?.name || d.station} 인근 ${dist}km<br>
            🍴 ${d.food}<br>
            📍 ${d.address}<br>
            🗓 ${d.since}년 개업 (${since}년째)
          </div>
          <div class="popup-links">
            <a href="${naverUrl}" target="_blank" class="map-link naver-link">N 네이버지도</a>
            <a href="${kakaoUrl}" target="_blank" class="map-link kakao-link">K 카카오맵</a>
          </div>
        </div>`, { maxWidth: 240 });
      m.on('click', () => highlightCard(d.id));
      m.addTo(map);
      markers[d.id] = m;
    });
    if (filteredData.length > 0) {
      if (currentStation && currentStation !== '전체') {
        const s = STATIONS[currentStation];
        map.setView([s.lat, s.lng], 14);
      } else {
        map.fitBounds(filteredData.map(d => [d.lat, d.lng]), { padding: [50, 50] });
      }
    }
  }

  /* ── 리스트 ── */
  function renderList() {
    const list = document.getElementById('restaurantList');
    if (!filteredData.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div>검색 결과가 없습니다</div>';
      return;
    }
    const rankIcons = ['🥇','🥈','🥉'];
    list.innerHTML = filteredData.map((d, idx) => {
      const rank = idx + 1;
      const dist = distToNearest(d).toFixed(1);
      const since = 2025 - d.since;
      const age = 2025 - d.since;
      const op = age >= 30 ? 1 : age >= 20 ? 0.78 : age >= 10 ? 0.52 : 0.28;
      const ageBadgeStyle = `background:rgba(136,85,255,${(op*0.3).toFixed(2)});color:rgba(200,160,255,${op.toFixed(2)});border:1px solid rgba(136,85,255,${(op*0.6).toFixed(2)});`;
      const both = d.isModel && d.isOld;
      const badgeEl = both
        ? `<span class="badge" style="${ageBadgeStyle}">⭐ 모범+노포</span>`
        : d.isModel
        ? `<span class="badge" style="${ageBadgeStyle}">🏅 모범</span>`
        : d.isOld
        ? `<span class="badge" style="${ageBadgeStyle}">⏳ ${since}년</span>`
        : '';
      const naverUrl = `https://map.naver.com/v5/search/${encodeURIComponent(d.name + ' ' + d.address)}`;
      const kakaoUrl = `https://map.kakao.com/?q=${encodeURIComponent(d.name)}`;
      return `
        <div class="restaurant-card ${selectedId === d.id ? 'highlighted' : ''}" id="card-${d.id}" onclick="selectCard(${d.id})">
          <div class="rank-badge">${rank <= 3 ? rankIcons[rank-1] : ''}</div>
          <div class="card-top">
            <div class="card-name">${d.name}</div>
            <div class="card-badges">${badgeEl}</div>
          </div>
          <div class="card-meta">
            <span class="tag tag-station">📡 ${(d.station === 'MBC' || d.station === 'YTN') ? '상암' : d.station}</span>
            <span class="tag tag-food">${d.food}</span>
            <span class="tag-distance">📍 ${dist}km</span>
          </div>
          <div class="card-address">${d.address}</div>
          <div class="card-since">🗓 ${d.since}년 개업 · ${since}년째 영업 중</div>
          <div class="map-links">
            <a href="${naverUrl}" target="_blank" class="map-link naver-link" onclick="event.stopPropagation()">N 네이버지도</a>
            <a href="${kakaoUrl}" target="_blank" class="map-link kakao-link" onclick="event.stopPropagation()">K 카카오맵</a>
          </div>
        </div>`;
    }).join('');
  }

  /* ── 통계 ── */
  function updateStats() {
    document.getElementById('totalCount').textContent = filteredData.length;
    document.getElementById('modelCount').textContent = filteredData.filter(d => d.isModel).length;
    document.getElementById('oldCount').textContent   = filteredData.filter(d => d.isOld).length;
  }

  /* ── 인터랙션 ── */
  function selectCard(id) {
    selectedId = id;
    const d = filteredData.find(x => x.id === id);
    if (d) { map.setView([d.lat, d.lng], 15); markers[id]?.openPopup(); }
    renderList();
    document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function highlightCard(id) {
    selectedId = id;
    renderList();
    document.getElementById(`card-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  /* ── 이벤트 ── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentStation = btn.dataset.station;
      applyFilters();
    });
  });

  document.querySelectorAll('.tag-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter;
      if (currentFilters.has(f)) { currentFilters.delete(f); btn.classList.remove('active'); }
      else { currentFilters.add(f); btn.classList.add('active'); }
      applyFilters();
    });
  });

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      sortData(); renderList();
    });
  });

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('searchInputMobile').addEventListener('input', e => {
    document.getElementById('searchInput').value = e.target.value;
    applyFilters();
  });

  /* ── 초기 로드 ── */
  applyFilters();
</script>
</body>
</html>
